<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Center · Sign in</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#312e81 100%);
    display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e2e8f0;}
  .card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:48px 44px;width:380px;
    text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .lock{font-size:44px;margin-bottom:18px;}
  .title{font-size:19px;font-weight:700;margin-bottom:6px;}
  .sub{font-size:13px;color:#94a3b8;margin-bottom:28px;line-height:1.6;}
  input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;transition:border-color .2s;}
  input:focus{border-color:#6366f1;}
  input::placeholder{color:#64748b;}
  button{width:100%;margin-top:16px;padding:13px;border:none;border-radius:10px;
    background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:opacity .2s;}
  button:hover{opacity:.9;}
  .err{color:#f87171;font-size:13px;margin-top:14px;min-height:18px;}
</style>
</head>
<body>
<div class="card">
  <div class="lock">\u{1F512}</div>
  <div class="title">Document Center</div>
  <div class="sub">Authorized access only · 请输入访问密码</div>
  <input id="pwd" type="password" placeholder="请输入密码" autocomplete="off" autofocus>
  <button id="btn" onclick="tryUnlock()">解锁</button>

</div>

function b64ToBytes(b){const bin=atob(b);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function decrypt(pwd){
  const full=b64ToBytes(BLOB);
  const salt=full.slice(0,16),nonce=full.slice(16,28),data=full.slice(28);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:nonce},key,data);
  return new TextDecoder().decode(plain);
}
async function tryUnlock(){
  const pwd=document.getElementById('pwd').value;
  const err=document.getElementById('err');
  if(!pwd){err.textContent='请输入密码';return;}
  err.textContent='解密中...';
  try{const html=await decrypt(pwd);sessionStorage.setItem('qb_pwd',pwd);document.open();document.write(html);document.close();}
  catch(e){err.textContent='\u5bc6\u7801\u9519\u8bef\uff0c\u8bf7\u91cd\u8bd5';}
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
(async()=>{const saved=sessionStorage.getItem('qb_pwd');if(saved){try{const html=await decrypt(saved);document.open();document.write(html);document.close();}catch(e){}}})();
